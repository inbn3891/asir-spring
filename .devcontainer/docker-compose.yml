services:
  db:
    image: mariadb:10.11
    container_name: asir-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: asir_db
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - asir-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asir-dev
    volumes:
      - ..:/workspaces:cached
    command: sleep infinity
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/asir_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:8080"
      - "5173:5173"
    depends_on:
      db:
        condition: service_healthy

volumes:
  asir-db-data: