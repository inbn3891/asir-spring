name: Deploy to EC2

on:
  push:
    branches: [main]
    # 백엔드 코드나 워크플로우가 변경될 때만 실행되도록 필터링 (선택 사항)
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # 모든 실행 명령어의 기본 경로를 backend 폴더로 고정합니다.
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3
        with:
          # 루트에 .git이 있으므로 전체 소스를 가져옵니다.
          fetch-depth: 0

      - name: JDK 17 설정
        uses: actions/setup-java@v3
        with: 
          java-version : '17'
          distribution: 'temurin'

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: Gradle 빌드
        run: ./gradlew clean build -x test

      - name: Docker 이미지 빌드 및 푸쉬
        run: |
          docker login -u ${{secrets.DOCKER_USERNAME}} -p ${{secrets.DOCKER_PASSWORD}}
          # 빌드 컨텍스트를 현재 폴더(./backend)로 지정합니다.
          docker build -t ${{secrets.DOCKER_USERNAME}}/asir-spring:latest .
          docker push ${{secrets.DOCKER_USERNAME}}/asir-spring:latest

      - name : EC2 배포
        uses: appleboy/ssh-action@master
        with:
          host: ${{secrets.EC2_HOST}}
          username: ubuntu
          key: ${{secrets.EC2_SSH_KEY}}
          script: |
            docker pull ${{secrets.DOCKER_USERNAME}}/asir-spring:latest
            docker stop a-sir-app || true
            docker rm a-sir-app || true
            docker run -d \
                    --name a-sir-app \
                    -p 8080:8080 \
                    -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
                    ${{ secrets.DOCKER_USERNAME }}/asir-spring:latest