name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: JDK 17 설정
        uses: actions/setup-java@v3
        with: 
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: Gradle 빌드
        run: ./gradlew clean build -x test

      - name: Docker 이미지 빌드 및 푸시
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker build -t ${{ secrets.DOCKER_USERNAME }}/asir-spring:latest -f Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/asir-spring:latest

      - name: EC2에 docker-compose 파일 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          # 루트의 docker-compose.prod.yml을 EC2로 전송
          source: "docker-compose.prod.yml"
          target: "/home/ubuntu"
          overwrite: true

      - name: EC2 배포
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 환경변수 파일 생성
            cat > /home/ubuntu/.env << EOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            AI_SERVER_URL=${{ secrets.AI_SERVER_URL }}
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            EOF
            
            # 최신 이미지 pull 후 앱만 재시작 (DB는 유지)
            cd /home/ubuntu
            docker compose -f docker-compose.prod.yml --env-file .env pull app
            docker compose -f docker-compose.prod.yml --env-file .env up -d