name: Front Deploy (React)

on:
  push:
    branches: [main]
    paths:
      - 'front/**'
      - '.github/workflows/front-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./front

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Node.js 설정
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm install

      - name: 리액트 빌드
        run: npm run build

      - name: EC2로 빌드 파일 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "front/dist/*"    # checkout 기준 경로
          target: "/var/www/html"
          strip_components: 2
          overwrite: true

      - name: Nginx 재시작
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl reload nginx || true