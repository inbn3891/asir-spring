spring:
  datasource:
    # Docker Compose 서비스 명인 'db'를 사용합니다.
    url: jdbc:mariadb://db:3306/asir_db
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true